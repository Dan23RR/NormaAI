# Pre-commit hooks - secret hygiene + lint before anything reaches CI.
# Setup (one-time):  pip install pre-commit && pre-commit install
# Run on demand:     pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=2048']
      - id: check-merge-conflict
      - id: check-yaml
        exclude: ^infra/grafana/  # Grafana provisioning uses templated YAML
      - id: detect-private-key
      - id: end-of-file-fixer
        files: ^(src|tests)/.*\.py$
      - id: trailing-whitespace
        files: ^(src|tests)/.*\.py$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(src|tests)/
      - id: ruff-format
        files: ^(src|tests)/
