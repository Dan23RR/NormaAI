<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NormaAI · Dashboard</title>
  <template id="__bundler_thumbnail" data-bg-color="#0a0d12">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
          <stop offset="0" stop-color="#5b8cff"/>
          <stop offset="1" stop-color="#b08bff"/>
        </linearGradient>
      </defs>
      <rect x="380" y="220" width="440" height="360" rx="60" fill="url(#g)"/>
      <text x="600" y="445" font-family="Inter,sans-serif" font-size="220" font-weight="800" text-anchor="middle" fill="#fff">N</text>
    </svg>
  </template>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="chrome.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="interactive.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel" data-presets="react">
    const { useState } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "role": "dpo",
      "density": "comfortable",
      "framework": "ALL",
      "range": "90g"
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
      const [active, setActive] = useState('overview');
      const [collapsed, setCollapsed] = useState(false);
      const [client, setClient] = useState('ALL');

      const role = tweaks.role;
      const framework = tweaks.framework;
      const range = tweaks.range;

      return (
        <div className={`app density-${tweaks.density}`} data-screen-label={`01 ${active}`}>
          <window.NormaSidebar
            active={active}
            onNav={setActive}
            collapsed={collapsed}
            onToggle={() => setCollapsed(c => !c)}
            role={role}
          />
          <div className="main">
            <window.NormaTopbar
              active={active}
              role={role}
              framework={framework}
              onFramework={(v) => setTweak('framework', v)}
              range={range}
              onRange={(v) => setTweak('range', v)}
              client={client}
              onClient={setClient}
            />
            <main className="content">
              {active === 'overview' && <window.OverviewSection role={role} framework={framework} range={range} />}
              {active === 'qa'         && <window.QASection role={role} />}
              {active === 'gap'        && <window.GapSection role={role} framework={framework} />}
              {active === 'monitor'    && <window.MonitorSection />}
              {active === 'cross'      && <window.CrossSection />}
              {active === 'alerts'     && <window.AlertsSection />}
              {active === 'feed'       && <window.FeedSection />}
              {active === 'documents'  && <window.DocumentsSection />}
              {active === 'reports'    && <window.ReportsSection />}
              {active === 'clients'    && <window.ClientsSection />}
              {active === 'audit'      && <window.AuditSection />}
              {active === 'workflow'   && <window.WorkflowSection role={role} />}
              {active === 'analytics'  && <window.AnalyticsSection />}
              {active === 'admin'      && <window.AdminSection />}
            </main>
            <footer className="footer">
              <span className="badge-art50">AI Act Art. 50</span>
              <span className="footer-text">
                NormaAI utilizza intelligenza artificiale per analizzare testi normativi.
                Le informazioni hanno scopo informativo e di supporto decisionale,
                <strong> non costituiscono consulenza legale</strong>.
                Per decisioni vincolanti consultare un professionista qualificato.
              </span>
            </footer>
          </div>

          <window.TweaksPanel title="Tweaks">
            <window.TweakSection label="Ruolo utente">
              <window.TweakRadio
                value={tweaks.role}
                onChange={v => setTweak('role', v)}
                options={['dpo', 'consultant', 'exec']}
              />
            </window.TweakSection>

            <window.TweakSection label="Densità">
              <window.TweakRadio
                value={tweaks.density}
                onChange={v => setTweak('density', v)}
                options={['compact', 'comfortable']}
              />
            </window.TweakSection>

            <window.TweakSection label="Range temporale">
              <window.TweakSelect
                value={tweaks.range}
                onChange={v => setTweak('range', v)}
                options={[
                  { value: '7g',  label: 'Ultimi 7 giorni' },
                  { value: '30g', label: 'Ultimi 30 giorni' },
                  { value: '90g', label: 'Ultimi 90 giorni' },
                  { value: 'YTD', label: 'YTD 2026' },
                ]}
              />
            </window.TweakSection>

            <window.TweakSection label="Framework">
              <window.TweakSelect
                value={tweaks.framework}
                onChange={v => setTweak('framework', v)}
                options={[
                  { value: 'ALL',      label: 'Tutti i framework' },
                  { value: 'CSRD',     label: 'CSRD' },
                  { value: 'CSDDD',    label: 'CSDDD' },
                  { value: 'AI_ACT',   label: 'AI Act' },
                  { value: 'DORA',     label: 'DORA' },
                  { value: 'NIS2',     label: 'NIS2' },
                  { value: 'TAXONOMY', label: 'EU Taxonomy' },
                  { value: 'GDPR',     label: 'GDPR' },
                ]}
              />
            </window.TweakSection>
          </window.TweaksPanel>
          <window.NormaToaster />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
