# ============================================================
# NormaAI — Infrastructure Only (Postgres + Qdrant + Redis)
# Use this when running the app locally with uvicorn.
#
# Usage:
#   docker compose -f docker-compose.infra.yml up -d
#   uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
# ============================================================

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: normaai-postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: normaai
      POSTGRES_USER: normaai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U normaai"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    security_opt:
      - no-new-privileges:true
    networks:
      - normaai-network

  qdrant:
    image: qdrant/qdrant:v1.16.2
    container_name: normaai-qdrant
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
    security_opt:
      - no-new-privileges:true
    networks:
      - normaai-network

  redis:
    image: redis:7-alpine
    container_name: normaai-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    security_opt:
      - no-new-privileges:true
    networks:
      - normaai-network

volumes:
  postgres_data:
  qdrant_data:
  redis_data:

networks:
  normaai-network:
    driver: bridge
