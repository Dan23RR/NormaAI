# Production overlay - Hetzner deploy (G10).
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# What it changes vs the base file:
#   - Caddy terminates TLS on 80/443 (automatic Let's Encrypt for API_DOMAIN)
#     and is the ONLY publicly exposed service
#   - the app is reachable only on the internal network (no host port)
#   - APP_ENV forced to production (fail-fast config validation, HS256 blocked)
#   - observability UIs stay bound to 127.0.0.1 -> reach them via SSH tunnel:
#     ssh -L 3001:localhost:3001 -L 9090:localhost:9090 root@<server>

services:
  caddy:
    image: caddy:2.8-alpine
    container_name: normaai-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN:-api.normaai.org}
      ACME_EMAIL: ${ACME_EMAIL:-info@normaai.org}
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - normaai-network

  app:
    # No public port in production - Caddy proxies to it on the internal
    # network. `ports: []` would not override the base mapping, hence !override.
    ports: !override []
    environment:
      APP_ENV: production

volumes:
  caddy_data:
  caddy_config:
