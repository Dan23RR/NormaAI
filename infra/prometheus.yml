global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/prometheus.rules.yml

scrape_configs:
  - job_name: 'normaai'
    metrics_path: '/api/v1/metrics/prometheus'
    bearer_token: '${PROMETHEUS_BEARER_TOKEN}'
    static_configs:
      - targets: ['app:8000']
        labels:
          service: 'normaai'
          environment: 'production'
